<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AI Arena</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#06060b;color:#e0e4ef;min-height:100vh;display:flex;flex-direction:column}.hdr{padding:12px 16px;border-bottom:1px solid #16162a;background:#0c0c16;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px}.chat{flex:1;overflow-y:auto;padding:16px}.card{background:#ffffff03;border:1px solid #16162a;border-radius:10px;overflow:hidden;margin-bottom:14px}.card-h{padding:8px 12px;border-bottom:1px solid #ffffff05;display:flex;align-items:center;justify-content:space-between;background:#34d39906;flex-wrap:wrap;gap:4px}.card-b{padding:13px 15px;font-size:14px;line-height:1.7;color:#c8ccdb;white-space:pre-wrap}.card-tog{padding:8px 12px;border-top:1px solid #ffffff05;cursor:pointer;font-size:11px;color:#5e6380;display:flex;justify-content:space-between}.card-tog:hover{background:#ffffff03}.details{padding:4px 12px 12px;display:none}.ov{display:flex;gap:6px;margin-bottom:12px;padding:10px;border-radius:8px;background:#ffffff03}.ov-i{flex:1;text-align:center}.mc{margin-bottom:8px;padding:10px;border-radius:7px;background:#ffffff02}.raw{padding:8px 10px;border-radius:6px;font-size:11px;line-height:1.55;color:#5e6380;max-height:160px;overflow-y:auto;white-space:pre-wrap}.prog{padding:12px;background:#ffffff03;border:1px solid #16162a;border-radius:10px;margin-bottom:12px}.prog-m{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.prog-i{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid #16162a}.inp{padding:12px 16px;border-top:1px solid #16162a;background:#0c0c16}.inp-r{display:flex;gap:8px;max-width:660px;margin:0 auto}.inp-r input{flex:1;padding:11px 14px;border-radius:9px;border:1px solid #16162a;background:#ffffff05;color:#e0e4ef;font-size:14px;font-family:inherit;outline:none}.inp-r input:focus{border-color:#4c8bf540}.sbtn{padding:11px 18px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}.sbtn.on{background:linear-gradient(135deg,#4c8bf5,#ff7000);color:#fff}.sbtn.off{background:#ffffff06;color:#3a3d52;cursor:not-allowed}.fb{padding:10px 16px;border-top:1px solid #16162a;background:#0a0a14;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}.fb-star{font-size:22px;cursor:pointer;color:#2a2d42;transition:.15s}.fb-star.on{color:#f5b731}.opt{margin:0 12px 10px;padding:9px 12px;border-radius:7px;background:#6366f108;border:1px solid #6366f112;font-size:11px;color:#818cf8;line-height:1.5}.nb{padding:5px 10px;border-radius:6px;border:1px solid #16162a;background:#ffffff04;color:#5e6380;font-size:10px;cursor:pointer;font-family:inherit}.nb:hover{background:#ffffff08;color:#e0e4ef}@keyframes bk{0%,100%{opacity:.3}50%{opacity:1}}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ffffff08;border-radius:2px}</style></head><body>
<div class="hdr"><div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#4c8bf5,#6d28d9,#ff7000);display:flex;align-items:center;justify-content:center;font-size:15px">&#9889;</div><div><div style="font-weight:700;font-size:15px">AI Arena</div><div style="font-size:10px;color:#5e6380" id="hsub">Connecting...</div></div><span style="padding:3px 8px;border-radius:4px;background:#f5b73120;color:#f5b731;font-size:9px;font-weight:700">BETA</span></div><div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center"><div id="badges" style="display:flex;gap:5px;flex-wrap:wrap"></div><button class="nb" onclick="newChat()">&#10010; New Chat</button></div></div>
<div class="chat" id="chat"><div id="wel" style="text-align:center;margin-top:6vh"><div style="font-size:40px">&#9889;</div><h2 style="font-size:22px;font-weight:800;background:linear-gradient(135deg,#4c8bf5,#6d28d9,#ff7000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:12px 0 8px">Ask anything. Get the best answer.</h2><p style="color:#5e6380;font-size:13px;max-width:480px;margin:0 auto;line-height:1.6">AI optimizes your question, 3 models compete, an impartial judge scores and delivers the best answer. Supports follow-ups.</p><div style="margin-top:14px;display:flex;gap:4px;align-items:center;justify-content:center;flex-wrap:wrap"><span style="padding:4px 8px;border-radius:5px;font-size:10px;font-weight:600;color:#f55036;background:#f5503610">&#9889; Ask</span><span style="color:#3a3d52;font-size:11px">&#8594;</span><span style="padding:4px 8px;border-radius:5px;font-size:10px;font-weight:600;color:#f55036;background:#f5503610">&#9881; Optimize</span><span style="color:#3a3d52;font-size:11px">&#8594;</span><span style="padding:4px 8px;border-radius:5px;font-size:10px;font-weight:600;color:#4c8bf5;background:#4c8bf510">3 Compete</span><span style="color:#3a3d52;font-size:11px">&#8594;</span><span style="padding:4px 8px;border-radius:5px;font-size:10px;font-weight:600;color:#f55036;background:#f5503610">&#9878; Judge</span><span style="color:#3a3d52;font-size:11px">&#8594;</span><span style="padding:4px 8px;border-radius:5px;font-size:10px;font-weight:600;color:#34d399;background:#34d39910">&#10022; Best</span></div><div id="sugs" style="margin-top:18px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap"></div><div style="margin-top:14px;font-size:10px;color:#3a3d52">100% free &bull; Follow-ups &bull; 30 queries/hour</div></div></div>
<div class="inp"><div class="inp-r"><input type="text" id="inp" placeholder="Ask anything..." autocomplete="off"><button class="sbtn off" id="sbtn" disabled>&#9889;</button></div></div>
<div class="fb"><span style="font-size:11px;color:#5e6380;font-weight:600">Rate:</span><div id="stars"></div><input id="fbi" placeholder="Feedback..." style="padding:7px 10px;border-radius:7px;border:1px solid #16162a;background:#ffffff05;color:#e0e4ef;font-size:11px;font-family:inherit;outline:none;width:150px"><button onclick="sendFb()" style="padding:7px 12px;border-radius:7px;border:none;background:#f5b73120;color:#f5b731;font-size:11px;font-weight:700;cursor:pointer">Send</button><span id="fbok" style="font-size:11px;color:#34d399;display:none">&#10003;</span></div>
<script>const API=location.origin,M={};let ld=false,fr=0,history=[];const $=id=>document.getElementById(id),ch=$("chat"),ip=$("inp"),sb=$("sbtn");function esc(s){return s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"):""}function sc(v){return v>=8?"#34d399":v>=6?"#f5b731":"#f55036"}function newChat(){history=[];ch.innerHTML='<div style="text-align:center;margin-top:10vh"><div style="font-size:30px">&#9889;</div><p style="color:#5e6380;font-size:13px;margin-top:8px">New conversation. Ask anything!</p></div>';ip.focus()}["What causes northern lights?","Compare REST vs GraphQL","Best way to learn coding?","Explain quantum computing"].forEach(q=>{const b=document.createElement("button");b.textContent=q;b.style.cssText="padding:7px 13px;border-radius:7px;border:1px solid #16162a;background:#ffffff04;color:#5e6380;font-size:11px;cursor:pointer;font-family:inherit";b.onclick=()=>{ip.value=q;ub();ip.focus()};$("sugs").appendChild(b)});for(let i=1;i<=5;i++){const s=document.createElement("span");s.className="fb-star";s.textContent="\u2605";s.dataset.v=i;s.onclick=()=>{fr=i;document.querySelectorAll(".fb-star").forEach(x=>x.classList.toggle("on",+x.dataset.v<=i))};$("stars").appendChild(s)}async function sendFb(){if(!fr)return;try{await fetch(API+"/api/feedback",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({rating:fr,comment:$("fbi").value})});$("fbok").style.display="inline";setTimeout(()=>$("fbok").style.display="none",3000);$("fbi").value=""}catch(e){}}function ub(){const ok=ip.value.trim()&&!ld;sb.disabled=!ok;sb.className="sbtn "+(ok?"on":"off")}ip.addEventListener("input",ub);ip.addEventListener("keydown",e=>{if(e.key==="Enter"&&ip.value.trim()&&!ld){e.preventDefault();go()}});sb.addEventListener("click",()=>{if(!ld&&ip.value.trim())go()});(async()=>{try{const r=await fetch(API+"/api/status"),d=await r.json();Object.assign(M,d.models);const gq=d.groq||{};$("hsub").textContent=d.connected.length+"/3 models"+(gq.connected?" + judge":"");$("badges").innerHTML="";Object.entries(M).forEach(([id,m])=>{const b=document.createElement("span");b.style.cssText="display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;color:"+(m.connected?m.color:"#3a3d52")+";background:"+(m.connected?m.color+"12":"#ffffff03")+";border:1px solid "+(m.connected?m.color+"28":"#ffffff08");b.innerHTML=m.icon+" "+m.name+(m.connected?' <span style="width:5px;height:5px;border-radius:50%;background:#34d399;display:inline-block"></span>':"");$("badges").appendChild(b)});if(gq.connected){const j=document.createElement("span");j.style.cssText="display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;color:#f55036;background:#f5503612;border:1px solid #f5503628";j.innerHTML="\u2696 Judge <span style='width:5px;height:5px;border-radius:50%;background:#34d399;display:inline-block'></span>";$("badges").appendChild(j)}}catch(e){$("hsub").textContent="Server offline"}})();async function go(){const p=ip.value.trim();if(!p)return;ip.value="";ub();const w=$("wel");if(w)w.style.display="none";history.push({role:"user",content:p});const u=document.createElement("div");u.style.cssText="display:flex;justify-content:flex-end;margin-bottom:14px";u.innerHTML='<div style="max-width:72%;padding:11px 15px;border-radius:13px 13px 3px 13px;background:#6366f118;border:1px solid #6366f120;font-size:14px;line-height:1.6">'+esc(p)+"</div>";ch.appendChild(u);ld=true;ip.disabled=true;ub();const pr=document.createElement("div");pr.className="prog";pr.innerHTML='<div style="font-size:11px;color:#5e6380;font-weight:600">'+(history.length>2?"Follow-up: ":"")+'Optimizing &#8594; Competing &#8594; Judging...</div><div class="prog-m"></div>';const pm=pr.querySelector(".prog-m");Object.entries(M).forEach(([id,m])=>{if(!m.connected)return;const i=document.createElement("div");i.className="prog-i";i.dataset.m=id;i.style.color=m.color;i.innerHTML='<span style="width:6px;height:6px;border-radius:50%;background:'+m.color+';display:inline-block;animation:bk .7s infinite"></span>'+m.name;pm.appendChild(i)});ch.appendChild(pr);ch.scrollTop=ch.scrollHeight;try{const r=await fetch(API+"/api/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:p,history:history.slice(0,-1)})});const d=await r.json();if(d.rateLimit||(!d.answers&&d.error)){pr.remove();const er=document.createElement("div");er.style.cssText="padding:12px;margin-bottom:12px;border-radius:8px;background:#f5503610;border:1px solid #f5503620;font-size:13px;color:#f87171";er.textContent=d.error||"Something went wrong";ch.appendChild(er);ld=false;ip.disabled=false;ub();return}Object.entries(d.answers).forEach(([id,r])=>{const i=pr.querySelector('[data-m="'+id+'"]');if(i){i.style.borderColor=r.answer?"#34d39930":"#f5503630";i.style.background=r.answer?"#34d39908":"#f5503608";const dot=i.querySelector("span");if(dot)dot.style.animation="none"}});await new Promise(r=>setTimeout(r,400));pr.remove();const{answers:ans,evaluation:ev,optimizedPrompt:optP}=d,wm=M[ev.winner],scores=Object.entries(ev.scores||{}),uid="d"+Date.now();if(ev.bestAnswer)history.push({role:"assistant",content:ev.bestAnswer});let h='<div class="card"><div class="card-h"><div style="display:flex;align-items:center;gap:6px"><span style="color:#34d399;font-size:12px">&#10022;</span><span style="font-size:11px;font-weight:700;color:#34d399">Best Answer</span>';if(wm)h+='<span style="font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;background:'+wm.color+'15;color:'+wm.color+'">'+wm.icon+" "+wm.name+"</span>";h+='</div><div style="display:flex;gap:3px;align-items:center"><span style="font-size:8px;color:#5e6380;margin-right:4px">\u2696 Groq</span>';scores.forEach(([id,s])=>{const m=M[id];if(m)h+='<span style="font-size:9px;padding:2px 5px;border-radius:3px;font-family:monospace;font-weight:700;color:'+(ev.winner===id?m.color:"#5e6380")+";background:"+(ev.winner===id?m.color+"15":"#ffffff06")+'">'+m.icon+s.overall+"</span>"});h+='</div></div>';if(optP&&optP!==p)h+='<div class="opt"><b style="color:#818cf8">&#9881; Optimized: </b>'+esc(optP)+'</div>';h+='<div class="card-b">'+esc(ev.bestAnswer)+"</div>";if(ev.corrections&&ev.corrections.trim()&&!["None","No corrections needed.","none","N/A","","No corrections needed","None.","No factual corrections are needed.","No corrections are needed.","No corrections.","No corrections necessary.","No factual corrections needed.","None needed."].includes(ev.corrections.trim()))h+='<div style="margin:0 12px 10px;padding:8px 11px;border-radius:6px;background:#f5b73108;border:1px solid #f5b73112;font-size:11px;color:#5e6380"><b style="color:#f5b731">&#9888; </b>'+esc(ev.corrections)+"</div>";h+='<div class="card-tog" onclick="tog(\''+uid+"',this)\"><span>Show all "+scores.length+" answers &amp; scores</span><span>&#9662;</span></div><div class=\"details\" id=\""+uid+'"><div class="ov">';scores.forEach(([id,s])=>{const m=M[id];if(!m)return;const w=ev.winner===id;h+='<div class="ov-i"><div style="font-size:16px">'+m.icon+'</div><div style="font-size:9px;font-weight:700;color:'+m.color+'">'+m.name+'</div><div style="font-size:22px;font-weight:800;font-family:monospace;color:'+(w?"#34d399":"#5e6380")+'">'+s.overall+"</div>"+(w?'<div style="font-size:8px;color:#34d399;font-weight:700">&#9733; WINNER</div>':"")+"</div>"});h+="</div>";scores.forEach(([id,s])=>{const m=M[id];if(!m)return;const a=ans[id],fail=!a?.answer;h+='<div class="mc" style="border:1px solid '+m.color+'15"><div style="display:flex;align-items:center;gap:5px;margin-bottom:8px"><span style="color:'+m.color+';font-size:13px">'+m.icon+'</span><span style="font-size:11px;font-weight:700;color:'+m.color+'">'+m.name+"</span>"+(ev.winner===id?'<span style="font-size:8px;padding:2px 6px;border-radius:3px;background:#34d39915;color:#34d399;font-weight:700">WINNER</span>':"")+'<span style="margin-left:auto;font-size:10px;color:#5e6380;font-family:monospace">'+s.overall+"/10</span></div>";h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px">';["accuracy","completeness","clarity","helpfulness"].forEach(k=>{const v=s[k]||0;h+='<div style="padding:5px 6px;border-radius:4px;background:#ffffff03"><div style="font-size:8px;color:#5e6380;text-transform:uppercase;margin-bottom:3px">'+k+'</div><div style="display:flex;align-items:center;gap:4px"><div style="width:52px;height:4px;background:#ffffff0a;border-radius:2px;overflow:hidden"><div style="width:'+(v*10)+"%;height:100%;border-radius:2px;background:"+sc(v)+'"></div></div><span style="font-size:9px;font-weight:700;color:#5e6380;font-family:monospace">'+v+"</span></div></div>"});h+="</div>";h+='<div class="raw" style="background:'+m.color+"06;border:1px solid "+m.color+"0e;color:"+(fail?"#f55036":"#5e6380")+'">'+esc(a?.answer||a?.error||"N/A")+"</div></div>"});if(ev.reasoning)h+='<div style="margin-top:6px;padding:8px 10px;border-radius:6px;font-size:11px;color:#5e6380;background:#f5503608;border:1px solid #f5503610"><b style="color:#f55036">&#9878; </b>'+esc(ev.reasoning)+"</div>";h+="</div></div>";const el=document.createElement("div");el.innerHTML=h;ch.appendChild(el)}catch(e){pr.remove();const er=document.createElement("div");er.style.cssText="padding:10px;margin-bottom:12px;border-radius:8px;background:#f5503610;font-size:12px;color:#f87171";er.textContent="Error: "+e.message;ch.appendChild(er)}ld=false;ip.disabled=false;ub();ip.focus();ch.scrollTop=ch.scrollHeight}function tog(id,el){const d=document.getElementById(id);if(!d)return;const s=d.style.display!=="block";d.style.display=s?"block":"none";el.querySelector("span").textContent=s?"Hide details":"Show all answers & scores";el.querySelector("span:last-child").textContent=s?"\u25B4":"\u25BE"}</script></body></html>
